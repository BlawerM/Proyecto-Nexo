spring:
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=NexoDB;integratedSecurity=true;encrypt=true;trustServerCertificate=true
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect # Changed for SQL Server
        "[hibernate.format_sql]": true

  #Seguridad actual OAuth 2.0
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/default/jwks
          issuer-uri: https://my-auth-server.com
#   security:
#     user:
#       name: admin
#       password: 1234
      

server:
  port: 8081

spring.web.error.include-message: always