spring:
#DATASOURCE PARA SQLSERVER QUE SALIÓ MAL
#   datasource:
#     url: jdbc:sqlserver://localhost:1433;databaseName=NexoDB;integratedSecurity=true;encrypt=true;trustServerCertificate=true
#     driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  datasource:
    url: jdbc:postgresql://localhost:5432/NexoDB
    username: postgres
    password: 2015

#JPA PARA SQLSERVER QUE SALIÓ MAL
#   jpa:
#     hibernate:
#       ddl-auto: update
#     show-sql: true
#     properties:
#       hibernate:
#         dialect: org.hibernate.dialect.SQLServerDialect # Changed for SQL Server
#         "[hibernate.format_sql]": true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        # CAMBIO CLAVE: Usa el dialecto de Postgres, no el de SQL Server
        dialect: org.hibernate.dialect.PostgreSQLDialect 
        format_sql: true
  #Seguridad actual OAuth 2.0
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/default/jwks
          issuer-uri: https://my-auth-server.com
#   security:
#     user:
#       name: admin
#       password: 1234
      

server:
  port: 8081

spring.web.error.include-message: always