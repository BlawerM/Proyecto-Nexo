spring:
#DATASOURCE PARA SQLSERVER QUE SALIÓ MAL
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=NexoDB;integratedSecurity=true;encrypt=true;trustServerCertificate=true
    #Con conexión manual
    # url: jdbc:sqlserver://localhost:1433;databaseName=NexoDB;encrypt=true;trustServerCertificate=true
    # username: sa
    # password: 2015
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

#DATASOURCE para postgreSQL FUNCIONAL
  # datasource:
  #   url: jdbc:postgresql://localhost:5432/NexoDB
  #   username: postgres
  #   password: 2015

#JPA PARA SQLSERVER QUE SALIÓ MAL
  jpa:
      database-platform: org.hibernate.dialect.SQLServerDialect
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true

#JPA Para PostgresSQL FUNCIONAL
  # jpa:
  #   hibernate:
  #     ddl-auto: create
  #   show-sql: true
  #   properties:
  #     hibernate:
  #       dialect: org.hibernate.dialect.PostgreSQLDialect 
  #       format_sql: true

  #Seguridad actual OAuth 2.0
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/default/jwks
          issuer-uri: https://my-auth-server.com
#   security:
